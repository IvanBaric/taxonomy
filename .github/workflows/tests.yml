name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^9.0"
          - php: "8.2"
            laravel: "^12.0"
            testbench: "^10.0"
          - php: "8.3"
            laravel: "^13.0"
            testbench: "^11.0"

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          composer-options: --no-interaction --no-progress --prefer-dist --ansi

      - name: Install matrix dependencies
        run: |
          composer require \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
